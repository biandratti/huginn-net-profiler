services:
  pcap-dump:
    image: alpine:latest
    container_name: pcap-dump
    command: >
      sh -c "
        apk add --no-cache tcpdump &&
        echo 'Starting continuous PCAP dump' &&
        mkdir -p /shared/pcaps &&
        while true; do
          TIMESTAMP=$$(date +%H%M%S)
          PCAP_FILE=\"/shared/pcaps/dump_$${TIMESTAMP}.pcap\"
          echo \"Dumping to: $$(basename \"$$PCAP_FILE\")\"
          timeout 30s tcpdump -i ens4 -w \"$$PCAP_FILE\" -s 0 'port 443' 2>/dev/null || true
          if [ -f \"$$PCAP_FILE\" ] && [ -s \"$$PCAP_FILE\" ]; then
            ln -sf \"$$PCAP_FILE\" /shared/current.pcap
            echo \"Updated: $$(basename \"$$PCAP_FILE\") ($$(du -h \"$$PCAP_FILE\" | cut -f1))\"
            ls -t /shared/pcaps/*.pcap 2>/dev/null | tail -n +6 | xargs -r rm -f
          else
            rm -f \"$$PCAP_FILE\" 2>/dev/null || true
            echo \"Empty dump, keeping previous\"
          fi
          sleep 1
        done
      "
    volumes:
      - pcap-data:/shared  # Shared volume for PCAP files
    network_mode: host
    privileged: true
    restart: always

  traefik:
    image: traefik:v3.0
    container_name: traefik
    command:
      # Global configuration
      - "--log.level=INFO"
      - "--api.dashboard=true"
      # Providers
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http2.maxconcurrentstreams=250"
      - "--entrypoints.websecure.http2=true"
      - "--entrypoints.websecure.asdefault=true"
      # HTTP->HTTPS Redirection
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # Certificate Resolver (Let's Encrypt)
      - "--certificatesresolvers.letsencrypt.acme.email=maxibiandra@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./letsencrypt:/letsencrypt
      - ./traefik.yml:/etc/traefik/dynamic/traefik.yml:ro
    restart: always
    network_mode: host  # Back to host mode for external traffic
    labels:
      - "traefik.enable=false"

  huginn:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: huginn
    command:
      - "/app/huginn-api"
      - "--pcap-file"
      - "/shared/current.pcap"  # Read from continuously updated PCAP
      - "--bind"
      - "0.0.0.0:3000"
      - "--ja4-database"
      - "/app/ja4_database.json"
    privileged: true
    network_mode: host  # Access to host interfaces
    restart: always
    volumes:
      - ./ja4_database.json:/app/ja4_database.json:ro
      - pcap-data:/shared:ro  # Access to generated PCAP files
    depends_on:
      - traefik
      - pcap-dump  # Wait for PCAP dump to start
    labels:
      - "traefik.enable=true"
      # Router
      - "traefik.http.routers.huginn-app.rule=Host(`huginn-net.duckdns.org`)"
      - "traefik.http.routers.huginn-app.entrypoints=websecure"
      - "traefik.http.routers.huginn-app.service=huginn-app"
      # TLS
      - "traefik.http.routers.huginn-app.tls=true"
      - "traefik.http.routers.huginn-app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.huginn-app.tls.options=my-tls-options@file"
      # Service
      - "traefik.http.services.huginn-app.loadbalancer.server.port=3000"
      # Dashboard Router (for Traefik's own dashboard)
      - "traefik.http.routers.huginn-dashboard.rule=Host(`huginn-net.duckdns.org`) && PathPrefix(`/dashboard`)"
      - "traefik.http.routers.huginn-dashboard.service=api@internal"
      - "traefik.http.routers.huginn-dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=admin:$$apr1$$t4i5g2g3$$PklPBOaW8F8aJzsvM4pSg." # Usuario: admin, Pass: huginn
      - "traefik.http.routers.huginn-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.huginn-dashboard.tls.options=my-tls-options@file"

volumes:
  pcap-data:
    driver: local
